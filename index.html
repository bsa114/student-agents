<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Помощники для учёбы</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";}</script>
<style>
:root{
  --agent: #f0561f;
  --agent-2: #ff7a3d;
  --agent-soft: rgba(240,86,31,.10);
  --bg: #fbfaf8;
  --bg-2: #ffffff;
  --panel: #ffffff;
  --panel-2: #f4f1ed;
  --ink: #1f2024;
  --ink-soft: #74787f;
  --line: #ececea;
  --user: #fff1ea;
  --radius: 20px;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{
  font-family:'Inter',-apple-system,system-ui,sans-serif;
  background:
    radial-gradient(1100px 500px at 85% -10%, var(--agent-soft), transparent 60%),
    var(--bg);
  color:var(--ink);display:flex;flex-direction:column;height:100dvh;
  transition:background .4s;
}
header{
  flex:none;display:flex;align-items:center;gap:13px;
  padding:13px 22px;border-bottom:1px solid var(--line);
  background:rgba(255,255,255,.72);backdrop-filter:blur(12px);
}
.badge{
  width:40px;height:40px;border-radius:12px;flex:none;
  background:linear-gradient(135deg,var(--agent),var(--agent-2));
  display:grid;place-items:center;color:#fff;font-weight:700;
  font-family:'Unbounded';font-size:18px;transition:background .4s;
}
.head h1{margin:0;font-family:'Unbounded';font-weight:700;font-size:15px;letter-spacing:-.01em;}
.head p{margin:2px 0 0;font-size:12px;color:var(--ink-soft);}
.head .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#3ddc84;margin-right:5px;vertical-align:middle;}
.switcher{flex:none;display:flex;gap:7px;padding:10px 16px;border-bottom:1px solid var(--line);overflow-x:auto;background:var(--bg-2);}
.tab{
  flex:none;display:flex;align-items:center;gap:8px;cursor:pointer;
  padding:8px 14px;border-radius:12px;border:1px solid var(--line);
  background:var(--panel);font-size:13.5px;font-weight:500;color:var(--ink-soft);
  transition:border-color .15s,color .15s,background .15s;white-space:nowrap;
}
.tab .ic{width:22px;height:22px;border-radius:7px;display:grid;place-items:center;color:#fff;font-weight:700;font-family:'Unbounded';font-size:11px;}
.tab.active{color:var(--ink);border-color:var(--tab-color);background:var(--tab-soft);}
main{flex:1;overflow-y:auto;padding:24px 16px;}
.wrap{width:100%;max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:18px;}
.row{display:flex;gap:11px;align-items:flex-start;animation:rise .35s ease;}
.row.user{justify-content:flex-end;}
@keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.mini{
  width:32px;height:32px;border-radius:10px;flex:none;
  background:linear-gradient(135deg,var(--agent),var(--agent-2));
  display:grid;place-items:center;color:#fff;font-weight:700;font-family:'Unbounded';font-size:13px;transition:background .4s;
}
.bubble{padding:14px 17px;line-height:1.62;font-size:15px;max-width:86%;border-radius:var(--radius);word-wrap:break-word;overflow-wrap:anywhere;}
.bubble.bot{background:var(--panel);border:1px solid var(--line);border-top-left-radius:6px;box-shadow:0 1px 2px rgba(0,0,0,.03),0 10px 28px rgba(0,0,0,.04);}
.bubble.user{background:var(--user);border:1px solid var(--line);border-top-right-radius:6px;transition:background .4s;}
.bubble.bot h1,.bubble.bot h2,.bubble.bot h3{font-family:'Unbounded';font-size:14px;font-weight:500;margin:16px 0 7px;color:var(--agent);letter-spacing:.01em;}
.bubble.bot h1:first-child,.bubble.bot h2:first-child,.bubble.bot h3:first-child{margin-top:0;}
.bubble.bot p{margin:9px 0;}
.bubble.bot p:first-child{margin-top:0;}
.bubble.bot p:last-child{margin-bottom:0;}
.bubble.bot ul,.bubble.bot ol{margin:9px 0;padding-left:20px;}
.bubble.bot li{margin:5px 0;}
.bubble.bot li::marker{color:var(--agent);}
.bubble.bot strong{font-weight:600;color:#111;}
.bubble.bot code{background:var(--agent-soft);color:var(--agent);padding:2px 7px;border-radius:7px;font-size:13.5px;font-family:ui-monospace,Menlo,monospace;}
.bubble.bot pre{background:var(--panel-2);border:1px solid var(--line);padding:13px;border-radius:12px;overflow-x:auto;}
.bubble.bot pre code{background:none;color:var(--ink);padding:0;}
.bubble.bot table{border-collapse:collapse;width:100%;margin:11px 0;font-size:13.5px;}
.bubble.bot th,.bubble.bot td{border:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top;}
.bubble.bot th{background:var(--agent-soft);color:var(--agent);font-weight:600;font-family:'Inter';}
.bubble.bot hr{border:none;border-top:1px solid var(--line);margin:15px 0;}
.bubble.bot a{color:var(--agent);}
.hero{margin:auto;max-width:460px;text-align:center;padding:26px 16px;}
.hero .badge-lg{width:62px;height:62px;border-radius:18px;margin:0 auto 18px;background:linear-gradient(135deg,var(--agent),var(--agent-2));display:grid;place-items:center;color:#fff;font-family:'Unbounded';font-weight:700;font-size:27px;box-shadow:0 12px 34px var(--agent-soft);transition:background .4s;}
.hero h2{font-family:'Unbounded';font-weight:700;font-size:22px;margin:0 0 10px;letter-spacing:-.02em;}
.hero p{color:var(--ink-soft);font-size:14px;line-height:1.6;margin:0 0 22px;}
.chips{display:flex;flex-direction:column;gap:9px;}
.chip{background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:13px 16px;border-radius:13px;font-size:14px;cursor:pointer;text-align:left;transition:border-color .15s,transform .08s,background .15s;}
.chip:hover{border-color:var(--agent);background:var(--panel-2);transform:translateY(-1px);}
.typing{display:inline-flex;gap:5px;align-items:center;padding:3px 0;}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--agent);animation:blink 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,60%,100%{opacity:.25;}30%{opacity:1;}}
footer{flex:none;border-top:1px solid var(--line);background:rgba(255,255,255,.72);backdrop-filter:blur(12px);padding:14px 16px;}
.composer{max-width:720px;margin:0 auto;display:flex;gap:11px;align-items:flex-end;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:7px 7px 7px 16px;box-shadow:0 2px 10px rgba(0,0,0,.04);transition:border-color .15s;}
.composer:focus-within{border-color:var(--agent);}
textarea{flex:1;resize:none;border:none;background:transparent;color:var(--ink);font-size:15px;font-family:inherit;line-height:1.5;max-height:150px;outline:none;padding:7px 0;}
textarea::placeholder{color:var(--ink-soft);}
.send{flex:none;width:42px;height:42px;border:none;border-radius:13px;background:linear-gradient(135deg,var(--agent),var(--agent-2));color:#fff;cursor:pointer;display:grid;place-items:center;transition:opacity .15s,transform .06s,background .4s;}
.send svg{width:19px;height:19px;}
.attach-btn{flex:none;width:40px;height:40px;border:none;border-radius:12px;background:var(--panel-2);color:var(--ink-soft);cursor:pointer;display:grid;place-items:center;transition:color .15s,background .15s;}
.attach-btn:hover{color:var(--agent);background:var(--agent-soft);}
.attach-btn svg{width:19px;height:19px;}
.file-chip{max-width:720px;margin:0 auto 8px;display:flex;align-items:center;gap:10px;background:var(--agent-soft);border:1px solid var(--line);border-radius:12px;padding:9px 13px;font-size:13px;color:var(--ink);}
.file-chip .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.file-chip .fstatus{color:var(--ink-soft);font-size:12px;}
.file-chip .fx{cursor:pointer;color:var(--ink-soft);font-weight:700;padding:0 4px;}
.file-chip .fx:hover{color:var(--agent);}
.drop-overlay{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
  background:rgba(124,58,237,.10);backdrop-filter:blur(2px);pointer-events:none;}
.drop-overlay.show{display:flex;}
.drop-card{background:var(--panel);border:2px dashed var(--agent);border-radius:18px;
  padding:26px 34px;display:flex;flex-direction:column;align-items:center;gap:10px;
  box-shadow:0 12px 40px rgba(0,0,0,.12);color:var(--ink);}
.drop-card svg{width:34px;height:34px;color:var(--agent);}
.drop-card .big{font-family:'Unbounded';font-weight:500;font-size:16px;}
.drop-card .sub{font-size:12.5px;color:var(--ink-soft);}
.send:active{transform:scale(.92);}
.send:disabled{opacity:.4;cursor:default;}
.excel-btn{display:inline-flex;align-items:center;gap:7px;margin:4px 0 6px;padding:8px 13px;border:1px solid var(--line);border-radius:11px;background:var(--panel-2);color:var(--agent);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .15s,background .15s;}
.excel-btn:hover{border-color:var(--agent);background:var(--agent-soft);}
.msg-actions{display:flex;gap:8px;margin-top:10px;padding-top:9px;border-top:1px solid var(--line);}
.act-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid var(--line);border-radius:9px;background:transparent;color:var(--ink-soft);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:border-color .15s,color .15s,background .15s;}
.act-btn:hover{border-color:var(--agent);color:var(--agent);background:var(--agent-soft);}
.act-btn.done{color:var(--agent);border-color:var(--agent);}
.row.user .msg-actions{justify-content:flex-end;border-top:none;padding-top:6px;margin-top:6px;}
.bubble.user{position:relative;}
.hint{max-width:720px;margin:8px auto 0;font-size:11px;color:var(--ink-soft);text-align:center;}
/* Экран входа */
.login-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(900px 500px at 50% -10%, rgba(240,86,31,.10), transparent 60%), var(--bg);}
.login-card{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:34px 30px;
  width:340px;max-width:90vw;box-shadow:0 16px 50px rgba(0,0,0,.10);text-align:center;}
.login-card .logo{width:58px;height:58px;border-radius:16px;margin:0 auto 16px;
  background:linear-gradient(135deg,#f0561f,#2fc6cd);display:grid;place-items:center;color:#fff;
  font-family:'Unbounded';font-weight:700;font-size:26px;}
.login-card h2{font-family:'Unbounded';font-weight:700;font-size:19px;margin:0 0 6px;}
.login-card p{color:var(--ink-soft);font-size:13px;margin:0 0 20px;}
.login-card input{width:100%;padding:12px 14px;margin-bottom:11px;border:1px solid var(--line);
  border-radius:12px;font-size:14px;font-family:inherit;background:var(--bg-2);color:var(--ink);outline:none;}
.login-card input:focus{border-color:#f0561f;}
.login-card button{width:100%;padding:12px;border:none;border-radius:12px;cursor:pointer;
  background:linear-gradient(135deg,#f0561f,#ff7a3d);color:#fff;font-size:15px;font-weight:600;font-family:inherit;
  transition:opacity .15s;}
.login-card button:hover{opacity:.92;}
.login-err{color:#d33;font-size:12.5px;margin:2px 0 12px;min-height:16px;}
.login-hint{margin-top:16px;font-size:11.5px;color:var(--ink-soft);line-height:1.5;}
/* Раскладка приложения с сайдбаром */
.app-shell{display:flex;height:100dvh;}
.sidebar{flex:none;width:230px;border-right:1px solid var(--line);background:var(--bg-2);
  display:flex;flex-direction:column;overflow:hidden;transition:width .2s;}
.sidebar-head{padding:13px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px;}
.sidebar-head .mini-badge{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--agent),var(--agent-2));
  display:grid;place-items:center;color:#fff;font-family:'Unbounded';font-weight:700;font-size:13px;flex:none;}
.sidebar-head .who{flex:1;font-size:12.5px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.new-dialog{margin:11px 12px 6px;padding:10px;border:1px dashed var(--line);border-radius:11px;
  background:transparent;color:var(--agent);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:7px;transition:border-color .15s,background .15s;}
.new-dialog:hover{border-color:var(--agent);background:var(--agent-soft);}
.dialog-list{flex:1;overflow-y:auto;padding:4px 8px 10px;}
.dialog-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;cursor:pointer;
  font-size:13px;color:var(--ink-soft);margin-bottom:3px;transition:background .12s,color .12s;}
.dialog-item:hover{background:var(--panel-2);color:var(--ink);}
.dialog-item.active{background:var(--agent-soft);color:var(--agent);font-weight:600;}
.dialog-item .dtitle{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dialog-item .ddel{opacity:0;font-weight:700;padding:0 3px;transition:opacity .12s;flex:none;}
.dialog-item:hover .ddel{opacity:.6;}
.dialog-item .ddel:hover{opacity:1;color:#d33;}
.sidebar-foot{border-top:1px solid var(--line);padding:10px 12px;}
.logout-btn{width:100%;padding:9px;border:1px solid var(--line);border-radius:10px;background:transparent;
  color:var(--ink-soft);font-size:12.5px;font-family:inherit;cursor:pointer;transition:border-color .15s,color .15s;}
.logout-btn:hover{border-color:#d33;color:#d33;}
.main-col{flex:1;display:flex;flex-direction:column;min-width:0;}
@media(max-width:680px){.sidebar{width:60px;}.sidebar-head .who,.dialog-item .dtitle,.new-dialog span,.logout-btn span{display:none;}}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="logo">У</div>
    <h2>Помощники для учёбы</h2>
    <p>Войди, чтобы продолжить</p>
    <input type="text" id="loginUser" placeholder="Логин" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Пароль" autocomplete="current-password">
    <div class="login-err" id="loginErr"></div>
    <button onclick="doLogin()">Войти</button>
    <div class="login-hint">Тестовый доступ:<br>логин <b>student</b> · пароль <b>ucheba2025</b></div>
  </div>
</div>
<div class="drop-overlay" id="dropOverlay">
  <div class="drop-card">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
    <div class="big">Отпусти файл сюда</div>
    <div class="sub">фото, скан, docx или PDF</div>
  </div>
</div>
<div class="app-shell" id="appShell" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="mini-badge" id="sbBadge">Э</div>
      <div class="who" id="sbWho">Экзаменатор</div>
    </div>
    <button class="new-dialog" onclick="newDialog()"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg><span>Новый диалог</span></button>
    <div class="dialog-list" id="dialogList"></div>
    <div class="sidebar-foot">
      <button class="logout-btn" onclick="doLogout()"><span>Выйти из кабинета</span></button>
    </div>
  </aside>
  <div class="main-col">
<header>
  <div class="badge" id="hBadge">Э</div>
  <div class="head">
    <h1 id="hName">Экзаменатор</h1>
    <p><span class="dot"></span><span id="hStatus">Готов помочь с экзаменом</span></p>
  </div>
</header>

<div class="switcher" id="switcher"></div>

<main id="main">
  <div class="wrap" id="wrap"></div>
</main>

<footer>
  <div class="file-chip" id="fileChip" style="display:none">
    <span class="fname" id="fileName"></span>
    <span class="fstatus" id="fileStatus"></span>
    <span class="fx" onclick="clearFile()" title="Убрать">✕</span>
  </div>
  <div class="composer">
    <input type="file" id="fileInput" accept="image/*,.pdf,.docx" style="display:none" onchange="onFilePicked(event)">
    <button class="attach-btn" id="attach" onclick="document.getElementById('fileInput').click()" aria-label="Прикрепить файл" title="Прикрепить документ или фото">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
    </button>
    <textarea id="message" rows="1" placeholder="Напиши вопрос или тему…"></textarea>
    <button class="send" id="send" onclick="send()" aria-label="Отправить">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
  <div class="hint" id="hint">Экзаменатор готовит к экзамену, а не сдаёт за тебя. Проверяй важные факты.</div>
</footer>
  </div>
</div>

<script>
const AGENTS = {
  ekzamenator: {
    letter:"Э", name:"Экзаменатор", status:"Готов помочь с экзаменом",
    color:"#f0561f", color2:"#ff7a3d", soft:"rgba(240,86,31,.10)", userBg:"#fff1ea",
    heroTitle:"Разберём любой билет",
    heroText:"Объясню тему на понимание, соберу каркас устного ответа и проверю, готов ли ты. Не сдаю за тебя — готовлю к экзамену.",
    hint:"Экзаменатор готовит к экзамену, а не сдаёт за тебя. Проверяй важные факты.",
    chips:["Разбери билет «Первый закон Ньютона»","Объясни простыми словами теорему Пифагора","Поэкзаменуй меня по теме «Клеточное деление»"]
  },
  repetitor: {
    letter:"Я", name:"Языковой репетитор", status:"Поможет с языком",
    color:"#1f9d6b", color2:"#37c98e", soft:"rgba(31,157,107,.10)", userBg:"#e9f9f1",
    heroTitle:"Подтянем язык без страха",
    heroText:"По умолчанию немецкий, объясняю по-русски. Разберу грамматику, исправлю ошибки с объяснением, помогу собрать устный ответ. Рядом со мной не страшно ошибаться.",
    hint:"Языковой репетитор готовит к экзамену и учит понимать, а не сдаёт за тебя.",
    chips:["Проверь фразу: Ich habe ins Kino gegangen","Объясни, когда в немецком sein, а когда haben","Помоги собрать устный рассказ о себе на немецком"]
  },
  analitik: {
    letter:"А", name:"Аналитик списков", status:"Разберёт список в таблицу",
    color:"#2563c9", color2:"#4f8cf0", soft:"rgba(37,99,201,.10)", userBg:"#eaf1fd",
    heroTitle:"Список — в понятную таблицу",
    heroText:"Дай сырой список — классифицирую, сведу в таблицу, посчитаю и покажу, что в данных видно. Под таблицей будет кнопка «Скачать Excel». Ничего не выдумываю — работаю по тому, что есть.",
    hint:"Аналитик работает строго по данным списка — пустая клетка честнее придуманной.",
    chips:["Разбери список: Аня—маркетинг, Борис—разработка, Вика—маркетинг, Гена—разработка, Даша—продажи","Сгруппируй и посчитай по отделам","Найди дубли и пропуски в этом списке"]

  r.setProperty("--agent",a.color);
  r.setProperty("--agent-2",a.color2);
  r.setProperty("--agent-soft",a.soft);

  document.getElementById("hName").textContent=a.name;

function addExcelButtons(container){
  if(typeof XLSX==="undefined")return;
  const tables=container.querySelectorAll("table");
  tables.forEach((tbl,idx)=>{
    const btn=document.createElement("button");
    btn.className="excel-btn";
    btn.innerHTML='<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Скачать Excel';

function pad2(n){return String(n).padStart(2,"0");}
function stampDateTime(){
  const d=new Date();
  const date=d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
  const time=pad2(d.getHours())+"-"+pad2(d.getMinutes());
  return date+"_"+time;
}
function downloadTableAsExcel(tbl){
  try{
    const wb=XLSX.utils.table_to_book(tbl,{sheet:"Данные"});
    XLSX.writeFile(wb,"analiz_"+stampDateTime()+".xlsx");
  }catch(e){
    alert("Не удалось собрать файл: "+e.message);
  }
}

function addCopyButton(bubble,rawText){
  const bar=document.createElement("div");
  bar.className="msg-actions";
  const btn=document.createElement("button");
  btn.className="act-btn";
  const copyIcon='<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
  const okIcon='<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
  btn.innerHTML=copyIcon+' Скопировать';
  btn.onclick=async()=>{
    try{
      await navigator.clipboard.writeText(rawText);
    }catch(e){
      const ta=document.createElement("textarea");ta.value=rawText;document.body.appendChild(ta);ta.select();
      try{document.execCommand("copy");}catch(_){}
      document.body.removeChild(ta);
    }
    btn.classList.add("done");
    btn.innerHTML=okIcon+' Скопировано';
    setTimeout(()=>{btn.classList.remove("done");btn.innerHTML=copyIcon+' Скопировать';},1800);
  };
  bar.appendChild(btn);
  bubble.appendChild(bar);
}

// ===== Работа с прикреплёнными файлами =====
let attachedImage = null;   // data:image/...;base64,... для зрячей модели
let attachedText = null;    // извлечённый текст из docx/pdf
let attachedName = null;

function clearFile(){
  attachedImage=null; attachedText=null; attachedName=null;
  document.getElementById("fileChip").style.display="none";
  document.getElementById("fileInput").value="";
}
function showChip(name,status){
  document.getElementById("fileName").textContent=name;
  document.getElementById("fileStatus").textContent=status;
  document.getElementById("fileChip").style.display="flex";
}

// Сжимаем картинку, чтобы влезть в лимит запроса (~4.5МБ)
function compressImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const maxSide=1600;
        let {width,height}=img;
        if(width>maxSide||height>maxSide){
          if(width>height){height=Math.round(height*maxSide/width);width=maxSide;}
          else{width=Math.round(width*maxSide/height);height=maxSide;}
        }
        const canvas=document.createElement("canvas");
        canvas.width=width;canvas.height=height;
        canvas.getContext("2d").drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL("image/jpeg",0.82));
      };
      img.onerror=reject;
      img.src=e.target.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

async function onFilePicked(ev){
  const file=ev.target.files[0];
  if(!file)return;
  attachedImage=null; attachedText=null; attachedName=file.name;
  const ext=(file.name.split(".").pop()||"").toLowerCase();
  const isImage=file.type.startsWith("image/");

  try{
    if(isImage){
      showChip(file.name,"обрабатываю картинку…");
      attachedImage=await compressImage(file);
      showChip(file.name,"картинка готова");
    } else if(ext==="docx"){
      showChip(file.name,"читаю документ…");
      const buf=await file.arrayBuffer();
      const res=await mammoth.extractRawText({arrayBuffer:buf});
      attachedText=(res.value||"").trim();
      if(!attachedText){showChip(file.name,"текст не найден"); attachedName=null; return;}
      showChip(file.name,"документ прочитан");
    } else if(ext==="pdf"){
      showChip(file.name,"читаю PDF…");
      const buf=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      let text="";
      const maxPages=Math.min(pdf.numPages,30);
      for(let i=1;i<=maxPages;i++){
        const page=await pdf.getPage(i);
        const content=await page.getTextContent();
        text+=content.items.map(it=>it.str).join(" ")+"\n";
      }
      attachedText=text.trim();
      if(!attachedText){
        showChip(file.name,"в PDF нет текста — это скан? приложи как картинку");
        attachedName=null; return;
      }
      showChip(file.name,"PDF прочитан"+(pdf.numPages>30?" (первые 30 стр.)":""));
    } else {
      showChip(file.name,"формат не поддерживается");
      attachedName=null;
    }
  }catch(err){
    showChip(file.name,"не удалось прочитать файл");
    attachedImage=null; attachedText=null; attachedName=null;
  }
}

async function send(){
  if(busy)return;
  const text=input.value.trim();
  if(!text && !attachedImage && !attachedText)return;

  const d=getActiveDialog();
  // если это первое сообщение — уберём hero и дадим диалогу название по первым словам
  const isFirst = d.messages.length===0;
  if(document.getElementById("hero")) clearHero();

  let outMessage=text;
  if(attachedText){
    outMessage=(text?text+"\n\n":"Разбери этот документ.\n\n")+
      "=== ПРИЛОЖЕННЫЙ ДОКУМЕНТ: "+attachedName+" ===\n"+attachedText;
  }
  const outImage=attachedImage;

  let shownText=text;
  if(attachedName) shownText=(text?text+"  ":"")+"📎 "+attachedName;
  const displayText = shownText||("📎 "+attachedName);

  // сохраняем сообщение пользователя в историю
  d.messages.push({role:"user", text:text, displayText:displayText});
  if(isFirst && text){ d.title = text.slice(0,28)+(text.length>28?"…":""); renderDialogList(); }
  saveData();

  renderUserBubble(displayText, text);

  input.value="";input.style.height="auto";
  clearFile();
  busy=true;sendBtn.disabled=true;
  const bubble=renderBotBubble(true);
  try{
    const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:outMessage,agent:current,image:outImage})});
    const data=await res.json();
    if(data.reply){
      bubble.innerHTML=marked.parse(data.reply);addExcelButtons(bubble);addCopyButton(bubble,data.reply);
      d.messages.push({role:"bot", text:data.reply}); saveData();
    } else {
      bubble.innerHTML='<p>'+(data.error||"Пустой ответ")+'</p>';
    }
  }catch(err){bubble.innerHTML='<p>Не получилось связаться с сервером: '+err.message+'</p>';}
  finally{busy=false;sendBtn.disabled=false;scrollDown();input.focus();}
}


// ===== Перетаскивание файлов (drag & drop) =====
(function(){
  let depth=0;
  function ov(){ return document.getElementById("dropOverlay"); }
  function hasFiles(e){ return e.dataTransfer && Array.from(e.dataTransfer.types||[]).includes("Files"); }
  window.addEventListener("dragenter",e=>{ if(!hasFiles(e))return; e.preventDefault(); depth++; const o=ov(); if(o)o.classList.add("show"); });
  window.addEventListener("dragover",e=>{ if(!hasFiles(e))return; e.preventDefault(); });
  window.addEventListener("dragleave",e=>{ if(!hasFiles(e))return; depth--; if(depth<=0){depth=0; const o=ov(); if(o)o.classList.remove("show");} });
  window.addEventListener("drop",e=>{
    if(!hasFiles(e))return;
    e.preventDefault(); depth=0; const o=ov(); if(o)o.classList.remove("show");
    const file=e.dataTransfer.files && e.dataTransfer.files[0];
    if(!file)return;
    onFilePicked({ target: { files: [file] } });
  });
})();

// ================= КАБИНЕТ: вход, диалоги, память =================
const CREDS = { user:"student", pass:"ucheba2025" };
const LS_AUTH = "ucheba_auth";
const LS_DATA = "ucheba_dialogs";

// dialogs: { agentKey: [ {id, title, messages:[{role, text, image?}]} ], ... }
let dialogs = {};
let activeDialogId = {}; // agentKey -> id активного диалога

function loadData(){
  try{
    const raw = localStorage.getItem(LS_DATA);
    if(raw){ const d=JSON.parse(raw); dialogs=d.dialogs||{}; activeDialogId=d.active||{}; }
  }catch(e){ dialogs={}; activeDialogId={}; }
  // гарантируем, что у каждого агента есть хотя бы один диалог
  Object.keys(AGENTS).forEach(k=>{ if(!dialogs[k]||!dialogs[k].length){ createDialogFor(k,false); } });
}
function saveData(){
  try{ localStorage.setItem(LS_DATA, JSON.stringify({dialogs, active:activeDialogId})); }catch(e){}
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function createDialogFor(agentKey, makeActive){
  if(!dialogs[agentKey]) dialogs[agentKey]=[];
  const n = dialogs[agentKey].length+1;
  const d = { id:uid(), title:"Диалог "+n, messages:[] };
  dialogs[agentKey].push(d);
  if(makeActive!==false) activeDialogId[agentKey]=d.id;
  saveData();
  return d;
}
function getActiveDialog(){
  const list = dialogs[current]||[];
  let id = activeDialogId[current];
  let d = list.find(x=>x.id===id);
  if(!d){ d=list[0]; if(d) activeDialogId[current]=d.id; }
  return d;
}

function newDialog(){
  const d = createDialogFor(current, true);
  renderDialogList();
  renderActiveDialog();
}
function selectDialog(id){
  activeDialogId[current]=id; saveData();
  renderDialogList(); renderActiveDialog();
}
function deleteDialog(id, ev){
  if(ev) ev.stopPropagation();
  const list = dialogs[current]||[];
  const idx = list.findIndex(x=>x.id===id);
  if(idx>=0) list.splice(idx,1);
  if(!list.length) createDialogFor(current, true);
  if(activeDialogId[current]===id) activeDialogId[current]=list[0]? list[0].id : (dialogs[current][0]&&dialogs[current][0].id);
  saveData();
  renderDialogList(); renderActiveDialog();
}

function renderDialogList(){
  const box=document.getElementById("dialogList");
  const list=dialogs[current]||[];
  const act=activeDialogId[current];
  box.innerHTML="";
  list.forEach(d=>{
    const el=document.createElement("div");
    el.className="dialog-item"+(d.id===act?" active":"");
    el.innerHTML='<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><span class="dtitle">'+d.title+'</span><span class="ddel" title="Удалить">✕</span>';
    el.onclick=()=>selectDialog(d.id);
    el.querySelector(".ddel").onclick=(e)=>deleteDialog(d.id,e);
    box.appendChild(el);
  });
}

// перерисовать окно чата из сохранённой истории активного диалога
function renderActiveDialog(){
  const d=getActiveDialog();
  wrap.innerHTML="";
  if(!d || !d.messages.length){ renderHero(); return; }
  d.messages.forEach(m=>{
    if(m.role==="user"){
      renderUserBubble(m.displayText||m.text, m.text);
    } else {
      const bubble=renderBotBubble();
      bubble.innerHTML=marked.parse(m.text);
      addExcelButtons(bubble);
      addCopyButton(bubble,m.text);
    }
  });
  scrollDown();
}
